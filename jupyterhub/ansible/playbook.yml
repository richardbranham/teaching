---
- hosts: all
  become: yes

  vars:
    jupyterhub_dir: /opt/jupyterhub
    jupyterhub_user_storage_dir: /srv/jupyterhub/users
    jupyterhub_venv_dir: /opt/jupyterhub-venv
    notebook_image: classroom-notebook
    polymagnum_password: "{{ lookup('ansible.builtin.password', '/home/richard-branham/.polymagnum_password', length=20, chars='  ascii_letters,digits') }}"
    
  tasks:

  - name: Install packages
    apt:
      name:
        - docker.io
        - python3-pip
        - python3-venv
        - fail2ban
        - nginx
        - certbot
        - python3-certbot-nginx
        - ufw
        - net-tools
        - vim
        - sqlite3
      update_cache: yes

  - name: Create Docker network for JupyterHub
    command: docker network create jupyterhub-network
    register: docker_network_result
    changed_when: docker_network_result.rc == 0
    failed_when:
      - docker_network_result.rc != 0
      - '"already exists" not in docker_network_result.stderr'

  - name: Create JupyterHub virtual environment
    command: python3 -m venv {{ jupyterhub_venv_dir }}
    args:
      creates: "{{ jupyterhub_venv_dir }}/bin/python"

  - name: Install dockerspawner in virtual environment
    pip:
      name: dockerspawner
      state: present
      virtualenv: "{{ jupyterhub_venv_dir }}"
      virtualenv_command: python3 -m venv

  - name: Configure UFW to allow only required inbound ports
    ufw:
      direction: incoming
      policy: deny

  - name: Configure UFW to allow outbound traffic
    ufw:
      direction: outgoing
      policy: allow

  - name: Allow SSH through UFW
    ufw:
      rule: allow
      port: '22'
      proto: tcp

  - name: Allow HTTP through UFW
    ufw:
      rule: allow
      port: '80'
      proto: tcp

  - name: Allow HTTPS through UFW
    ufw:
      rule: allow
      port: '443'
      proto: tcp

  - name: Enable UFW
    ufw:
      state: enabled

  - name: Install NativeAuthenticator in virtual environment
    pip:
      name: jupyterhub-nativeauthenticator
      state: present
      virtualenv: "{{ jupyterhub_venv_dir }}"
      virtualenv_command: python3 -m venv

  - name: Start Docker
    service:
      name: docker
      state: started
      enabled: yes

  - name: Create richard user
    user:
      name: richard
      shell: /bin/bash
      create_home: yes
      state: present

  - name: Configure fail2ban
    copy:
      dest: /etc/fail2ban/jail.d/jupyterhub.conf
      content: |
        [DEFAULT]
        ignoreip = 127.0.0.1/8 ::1
        findtime = 60
        maxretry = 3
        bantime = 600
        backend = auto

        [sshd-10m]
        enabled = true
        port = ssh
        filter = sshd
        maxretry = 3
        bantime = 600

        [sshd-30m]
        enabled = true
        port = ssh
        filter = sshd
        maxretry = 6
        bantime = 1800

        [sshd-perm]
        enabled = true
        port = ssh
        filter = sshd
        maxretry = 9
        bantime = -1
        actionban = printf '%s\n' '<ip>' >> /var/log/banlist.txt

  - name: Ensure banlist file exists
    file:
      path: /var/log/banlist.txt
      state: touch
      mode: "0644"

  - name: Start and enable fail2ban
    service:
      name: fail2ban
      state: started
      enabled: yes

  - name: Create JupyterHub directory
    file:
      path: "{{ jupyterhub_dir }}"
      state: directory
      owner: root
      group: root
      mode: "0755"

  - name: Create persistent storage directory for users
    file:
      path: "{{ jupyterhub_user_storage_dir }}"
      state: directory
      owner: root
      group: root
      mode: "0755"

  - name: Create master files directory
    file:
      path: /srv/jupyterhub/CIST1220/midterm_files_master
      state: directory
      owner: root
      group: root
      mode: "0755"

  - name: Copy master midterm files to server
    copy:
      src: ../CIST1220_midterm_files/
      dest: /srv/jupyterhub/CIST1220/midterm_files_master/
      owner: root
      group: root
      mode: preserve

  - name: Make master midterm files read-only on the server
    shell: |
      find /srv/jupyterhub/CIST1220/midterm_files_master -type d -exec chmod 0555 {} +
      find /srv/jupyterhub/CIST1220/midterm_files_master -type f -exec chmod 0444 {} +
    changed_when: true

  - name: Deploy Dockerfile
    copy:
      dest: "{{ jupyterhub_dir }}/Dockerfile"
      content: |
        FROM jupyter/base-notebook:latest

        USER root

        RUN apt-get update && \
          apt-get install -y sqlite3 vim curl less iproute2 net-tools && \
          apt-get clean && \
          rm -rf /var/lib/apt/lists/*

        RUN mkdir -p /tmp/jupyter-runtime /tmp/jupyter-config /tmp/xdg/cache /tmp/xdg/data && \
            chown -R ${NB_UID}:${NB_GID} /tmp/jupyter-runtime /tmp/jupyter-config /tmp/xdg

        RUN useradd -m -s /bin/bash polymagnum && \
            usermod -aG sudo polymagnum && \
            echo 'polymagnum:{{ polymagnum_password }}' | chpasswd && \
            echo '%sudo ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/sudo        

        # Secure startup script that manages its own directories and permissions safely
        RUN mkdir -p /usr/local/bin/before-notebook.d/ && \
            echo '#!/bin/bash\n\
            set -e\n\
            mkdir -p /home/jovyan/CIST1220\n\
            \n\
            # Create a writable working folder without touching the read-only master copy\n\
            mkdir -p /home/jovyan/CIST1220/midterm_project\n\
            chown -R 1000:100 /home/jovyan/CIST1220/midterm_project\n\
            chmod -R u+rwX /home/jovyan/CIST1220/midterm_project\n\
            \n\
            # Only verify the mounted readonly directory; do not chown it\n\
            if [ -d "/home/jovyan/CIST1220/midterm_files_master" ] && [ -n "$(find /home/jovyan/CIST1220/midterm_files_master -mindepth 1 -maxdepth 1 -print -quit)" ]; then\n\
                echo "Master files are available for the user"\n\
            else\n\
                echo "Master files directory is not populated yet"\n\
            fi' > /usr/local/bin/before-notebook.d/sync_midterm.sh && \
            chmod +x /usr/local/bin/before-notebook.d/sync_midterm.sh

        USER ${NB_UID}

        RUN pip install \
            numpy \
            pandas \
            matplotlib \
            flask \
            jupyter-server-proxy \
            fastapi \
            uvicorn \ 
            streamlit \
            jupyterlab \
            copier

  - name: Build notebook image
    community.docker.docker_image:
      name: "{{ notebook_image }}"
      source: build
      build:
        path: "{{ jupyterhub_dir }}"

  - name: Deploy JupyterHub Dockerfile
    copy:
      dest: "{{ jupyterhub_dir }}/Dockerfile.jupyterhub"
      content: |
        FROM jupyterhub/jupyterhub:latest

        USER root

        RUN apt-get update && \
            apt-get install -y \
              sqlite3 \
              vim \
              less \
              iproute2 \
              net-tools \
              curl && \
            apt-get clean && \
            rm -rf /var/lib/apt/lists/*

        RUN pip install --no-cache-dir \
            dockerspawner \
            jupyterhub-nativeauthenticator \
            jupyterhub-idle-culler \
            flask \
            bcrypt \
            requests

  - name: Build custom JupyterHub image
    community.docker.docker_image:
      name: gtc-jupyterhub
      source: build
      build:
        path: "{{ jupyterhub_dir }}"
        dockerfile: Dockerfile.jupyterhub

  - name: Create JupyterHub config file
    copy:
      dest: "{{ jupyterhub_dir }}/jupyterhub_config.py"
      content: |
        import os
        import shutil
        import logging
        import pwd
        import grp
        from nativeauthenticator import NativeAuthenticator
        from tornado import web
        from dockerspawner import DockerSpawner
        from nativeauthenticator.orm import UserInfo

        log = logging.getLogger("jupyterhub")

        uid = 1000
        gid = 100

        class GwinnettDockerSpawner(DockerSpawner):

          async def start(self):

              storage_name = sanitize_username(self.user.name)

              user_home = (
                  f"/srv/jupyterhub/users/{storage_name}"
              )

              working_copy = (
                  f"{user_home}/CIST1220/midterm_files_working_copy"
              )

              master_dir = (
                  "/srv/jupyterhub/CIST1220/midterm_files_master"
              )

              os.makedirs(
                  os.path.dirname(working_copy),
                  exist_ok=True
              )

              #if not os.path.exists(working_copy):
              if (
                  not os.path.exists(working_copy)
                  or len(os.listdir(working_copy)) == 0
              ):

                  shutil.copytree(
                      master_dir,
                      working_copy
                  )

                  for root, dirs, files in os.walk(working_copy):

                      os.chown(root,1000,100)
                      os.chmod(root,0o755)

                      for d in dirs:
                          path=os.path.join(root,d)
                          os.chown(path,1000,100)
                          os.chmod(path,0o755)

                      for f in files:
                          path=os.path.join(root,f)
                          os.chown(path,1000,100)
                          os.chmod(path,0o644)

              self.volumes = {

                  user_home:
                      "/home/jovyan",

                  master_dir: {
                      "bind":
                          "/home/jovyan/CIST1220/midterm_files_master",
                      "mode":
                          "ro"
                  },

                  working_copy: {
                      "bind":
                          "/home/jovyan/CIST1220/midterm_files_working_copy",
                      "mode":
                          "rw"
                  }
              }

              return await super().start()

        def sanitize_username(username):
            return (
                username.lower()
                .replace("@", "_")
                .replace(".", "-")
            )

        class GwinnettTechAuthenticator(NativeAuthenticator):

            def normalize_username(self, username):
                return username.lower().strip()

            def validate_username(self, username):
                username = username.lower().strip()
                return (
                    username.endswith("@gwinnetttech.edu")
                    or username.endswith("@student.gwinnetttech.edu")
                )

            async def pre_spawn_start(self, user, spawner):
                db = self.db

                userinfo = db.query(UserInfo).filter(
                    UserInfo.username == user.name
                ).first()

                if userinfo and getattr(userinfo, "must_change_password", False):
                    raise web.HTTPError(
                        403,
                        "Password change required"
                    )
                    
                    
            def post_save_password(self, userinfo):
                userinfo.is_must_change_password = False

        c.JupyterHub.template_vars = {
            "login_notice": "First login requires changing your temporary password.",
            "password_admin_url": "/password-admin/"
        }

        c.JupyterHub.log_level = "INFO"
        c.JupyterHub.authenticator_class = GwinnettTechAuthenticator
        c.NativeAuthenticator.open_signup = True

        c.NativeAuthenticator.ask_email_on_signup = False

        c.NativeAuthenticator.tos = (
            "I understand that this system is for Gwinnett Technical College students and faculty only.  I affirm that I am either an employee or a current student at Gwinnett Technical College, or I have been given explicit authorization to use this system."
        )

        c.NativeAuthenticator.minimum_password_length = 10
        c.NativeAuthenticator.check_common_password = True
        c.Authenticator.allow_all = True
        c.Authenticator.admin_users = {"rbranham@gwinnetttech.edu"}

        c.NativeAuthenticator.tos = """
          This system is for Gwinnett Technical College students, faculty, and explicitly authorized users.

          If you forget your password, contact your instructor.

          Password resets will assign a temporary password that must be changed immediately.
          """

        c.JupyterHub.spawner_class = GwinnettDockerSpawner

        c.DockerSpawner.network_name = "jupyterhub-network"
        c.DockerSpawner.use_internal_ip = True

        c.DockerSpawner.cpu_limit = .5
        c.DockerSpawner.cpu_guarantee = 0.25
        c.DockerSpawner.mem_guarantee = ".25G"
        c.DockerSpawner.mem_limit = ".5G"

        c.JupyterHub.hub_connect_url = "http://jupyterhub:8081"

        c.JupyterHub.hub_ip = '0.0.0.0'
        c.JupyterHub.hub_connect_ip = '127.0.0.1'

        c.JupyterHub.bind_url = "http://0.0.0.0:8000/"
        c.JupyterHub.hub_bind_url = "http://0.0.0.0:8081"

        c.JupyterHub.trust_xheaders = True

        c.JupyterHub.services = [
          {
              "name": "idle-culler",
              "command": [
                  "python3",
                  "-m",
                  "jupyterhub_idle_culler",
                  "--timeout=1500",
                  "--cull-every=60",
              ],
          }
        ]        

        c.JupyterHub.load_roles = [
          {
              "name": "idle-culler",
              "services": ["idle-culler"],
              "scopes": [
                  "list:users",
                  "read:users:activity",
                  "read:servers",
                  "delete:servers",
              ],
          }
        ]

        c.JupyterHub.tornado_settings = {
            "max_header_size": 1048576,
        }

        c.Authenticator.allow_all = True
        c.DockerSpawner.image = "{{ notebook_image }}"
        c.DockerSpawner.remove = False
        c.DockerSpawner.notebook_dir = "/home/jovyan"

        c.DockerSpawner.extra_create_kwargs = {
            "user": "1000:100"
        }

        c.DockerSpawner.environment = {
            "CHOWN_HOME": "no",
            "NB_UID": "1000",
            "NB_GID": "100",
            "JUPYTER_RUNTIME_DIR": "/tmp/jupyter-runtime",
            "JUPYTER_CONFIG_DIR": "/tmp/jupyter-config",
            "XDG_CACHE_HOME": "/tmp/xdg/cache",
            "XDG_DATA_HOME": "/tmp/xdg/data",
            "XDG_STATE_HOME": "/tmp/xdg/state",
        }

  - name: Create JupyterHub volume
    community.docker.docker_volume:
      name: jupyterhub-data

  - name: Write Nginx site config
    copy:
      dest: /etc/nginx/sites-available/jupyterhub
      content: |
        server {
            listen 80;
            listen [::]:80;

            server_name jhub.branham.us;

            return 301 https://$host$request_uri;
        }

        server {
            listen 443 ssl;
            listen [::]:443 ssl;

            server_name jhub.branham.us;

            ssl_certificate /etc/letsencrypt/live/jhub.branham.us/fullchain.pem;
            ssl_certificate_key /etc/letsencrypt/live/jhub.branham.us/privkey.pem;

            location / {
                proxy_pass http://127.0.0.1:8000;

                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;

                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto https;

                proxy_http_version 1.1;

                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
            }
        }

  - name: Enable Nginx site
    file:
      src: /etc/nginx/sites-available/jupyterhub
      dest: /etc/nginx/sites-enabled/jupyterhub
      state: link

  - name: Remove default Nginx site
    file:
      path: /etc/nginx/sites-enabled/default
      state: absent

  - name: Configure Nginx worker limits
    blockinfile:
      path: /etc/nginx/nginx.conf
      marker: "#{mark} ANSIBLE MANAGED NGINX LIMITS"
      block: |
        #worker_processes auto;
        #worker_rlimit_nofile 65535;

        #events {
            #worker_connections 4096;
        #}

  - name: Run JupyterHub container
    community.docker.docker_container:
      name: jupyterhub
      image: gtc-jupyterhub
      restart_policy: unless-stopped

      published_ports:
        - "8000:8000"
        - "8888:8888"

      networks:
        - name: jupyterhub-network

      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
        - "{{ jupyterhub_dir }}/jupyterhub_config.py:/srv/jupyterhub/jupyterhub_config.py"
        - jupyterhub-data:/srv/jupyterhub
        - /srv/jupyterhub/users:/srv/jupyterhub/users
        - /srv/jupyterhub/CIST1220:/srv/jupyterhub/CIST1220

  - name: Write Certbot command to file for future reference
    copy:
      dest: /root/jhub-cert.txt
      content: |
        certbot --nginx -d jhub.branham.us --non-interactive --agree-tos --email admin@branham.us

  - name: Restart JupyterHub container
    community.docker.docker_container:
      name: jupyterhub
      state: started
      restart: yes

  - name: Start and enable Nginx
    service:
      name: nginx
      state: started
      enabled: yes

  - name: Reload Nginx
    service:
      name: nginx
      state: reloaded

  - name: Display generated password
    debug:
      msg:
        - "User created: polymagnum"
        - "Password: {{ polymagnum_password }}"