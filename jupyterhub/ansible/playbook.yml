---
- hosts: all
  become: yes

  vars:
    jupyterhub_dir: /opt/jupyterhub
    jupyterhub_user_storage_dir: /srv/jupyterhub/users
    jupyterhub_venv_dir: /opt/jupyterhub-venv
    notebook_image: classroom-notebook
    # github_client_id: Ov23li5Rb7rHQHtQ9I5A
    # github_client_secret: 1f60278438b2569326250439b9fed6e98f80c1b2
    # githubZZZ_callback_url: https://jhub.branham.us/hub/oauth_callback
    polymagnum_password: "{{ lookup('ansible.builtin.password', '/home/richard-branham/.polymagnum_password', length=20, chars='  ascii_letters,digits') }}"
    password_reset_user: "rbranham@gwinnetttech.edu"
    password_reset_password: "ChangeMe1@"
    
  tasks:

  - name: Install packages
    apt:
      name:
        - docker.io
        - python3-pip
        - python3-venv
        - fail2ban
        - nginx
        - certbot
        - python3-certbot-nginx
        - ufw
        - net-tools
        - vim
        - sqlite3
      update_cache: yes

  - name: Create Docker network for JupyterHub
    command: docker network create jupyterhub-network
    register: docker_network_result
    changed_when: docker_network_result.rc == 0
    failed_when:
      - docker_network_result.rc != 0
      - '"already exists" not in docker_network_result.stderr'

  - name: Create JupyterHub virtual environment
    command: python3 -m venv {{ jupyterhub_venv_dir }}
    args:
      creates: "{{ jupyterhub_venv_dir }}/bin/python"

  - name: Install dockerspawner in virtual environment
    pip:
      name: dockerspawner
      state: present
      virtualenv: "{{ jupyterhub_venv_dir }}"
      virtualenv_command: python3 -m venv

  - name: Configure UFW to allow only required inbound ports
    ufw:
      direction: incoming
      policy: deny

  - name: Configure UFW to allow outbound traffic
    ufw:
      direction: outgoing
      policy: allow

  - name: Allow SSH through UFW
    ufw:
      rule: allow
      port: '22'
      proto: tcp

  - name: Allow HTTP through UFW
    ufw:
      rule: allow
      port: '80'
      proto: tcp

  - name: Allow HTTPS through UFW
    ufw:
      rule: allow
      port: '443'
      proto: tcp

  - name: Enable UFW
    ufw:
      state: enabled

  # - name: Install oauthenticator in virtual environment
  #   pip:
  #     name: oauthenticator
  #     state: present
  #     virtualenv: "{{ jupyterhub_venv_dir }}"
  #     virtualenv_command: python3 -m venv

  - name: Install NativeAuthenticator in virtual environment
    pip:
      name: jupyterhub-nativeauthenticator
      state: present
      virtualenv: "{{ jupyterhub_venv_dir }}"
      virtualenv_command: python3 -m venv

  - name: Start Docker
    service:
      name: docker
      state: started
      enabled: yes

  - name: Create richard user
    user:
      name: richard
      shell: /bin/bash
      create_home: yes
      state: present

  - name: Configure fail2ban
    copy:
      dest: /etc/fail2ban/jail.d/jupyterhub.conf
      content: |
        [DEFAULT]
        ignoreip = 127.0.0.1/8 ::1
        findtime = 60
        maxretry = 3
        bantime = 600
        backend = auto

        [sshd-10m]
        enabled = true
        port = ssh
        filter = sshd
        maxretry = 3
        bantime = 600

        [sshd-30m]
        enabled = true
        port = ssh
        filter = sshd
        maxretry = 6
        bantime = 1800

        [sshd-perm]
        enabled = true
        port = ssh
        filter = sshd
        maxretry = 9
        bantime = -1
        actionban = printf '%s\n' '<ip>' >> /var/log/banlist.txt

  - name: Ensure banlist file exists
    file:
      path: /var/log/banlist.txt
      state: touch
      mode: "0644"

  - name: Start and enable fail2ban
    service:
      name: fail2ban
      state: started
      enabled: yes

  - name: Create JupyterHub directory
    file:
      path: "{{ jupyterhub_dir }}"
      state: directory
      owner: root
      group: root
      mode: "0755"

  - name: Create persistent storage directory for users
    file:
      path: "{{ jupyterhub_user_storage_dir }}"
      state: directory
      owner: root
      group: root
      mode: "0755"

  - name: Create master files directory
    file:
      path: /srv/jupyterhub/CIST1220/midterm_files_master
      state: directory
      owner: root
      group: root
      mode: "0755"

  - name: Copy master midterm files to server
    copy:
      src: ../CIST1220_midterm_files/
      dest: /srv/jupyterhub/CIST1220/midterm_files_master/
      owner: root
      group: root
      mode: preserve

  - name: Make master midterm files read-only on the server
    shell: |
      find /srv/jupyterhub/CIST1220/midterm_files_master -type d -exec chmod 0555 {} +
      find /srv/jupyterhub/CIST1220/midterm_files_master -type f -exec chmod 0444 {} +
    changed_when: true
      
  - name: Deploy Dockerfile
    copy:
      dest: "{{ jupyterhub_dir }}/Dockerfile"
      content: |
        FROM jupyter/base-notebook:latest

        USER root

        RUN apt-get update && \
          apt-get install -y sqlite3 vim curl && \
          apt-get clean && \
          rm -rf /var/lib/apt/lists/*

        RUN mkdir -p /tmp/jupyter-runtime /tmp/jupyter-config /tmp/xdg/cache /tmp/xdg/data && \
            chown -R ${NB_UID}:${NB_GID} /tmp/jupyter-runtime /tmp/jupyter-config /tmp/xdg

        RUN useradd -m -s /bin/bash polymagnum && \
            usermod -aG sudo polymagnum && \
            echo 'polymagnum:{{ polymagnum_password }}' | chpasswd && \
            echo '%sudo ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/sudo        

        # Secure startup script that manages its own directories and permissions safely
        RUN mkdir -p /usr/local/bin/before-notebook.d/ && \
            echo '#!/bin/bash\n\
            set -e\n\
            mkdir -p /home/jovyan/CIST1220\n\
            \n\
            # Create a writable working folder without touching the read-only master copy\n\
            mkdir -p /home/jovyan/CIST1220/midterm_project\n\
            chown -R 1000:100 /home/jovyan/CIST1220/midterm_project\n\
            chmod -R u+rwX /home/jovyan/CIST1220/midterm_project\n\
            \n\
            # Only verify the mounted readonly directory; do not chown it\n\
            if [ -d "/home/jovyan/CIST1220/midterm_files_master" ] && [ -n "$(find /home/jovyan/CIST1220/midterm_files_master -mindepth 1 -maxdepth 1 -print -quit)" ]; then\n\
                echo "Master files are available for the user"\n\
            else\n\
                echo "Master files directory is not populated yet"\n\
            fi' > /usr/local/bin/before-notebook.d/sync_midterm.sh && \
            chmod +x /usr/local/bin/before-notebook.d/sync_midterm.sh

        USER ${NB_UID}

        RUN pip install \
            numpy \
            pandas \
            matplotlib \
            flask \
            jupyter-server-proxy \
            fastapi \
            uvicorn \ 
            streamlit \
            jupyterlab \
            copier

  - name: Build notebook image
    community.docker.docker_image:
      name: "{{ notebook_image }}"
      source: build
      build:
        path: "{{ jupyterhub_dir }}"

  - name: Deploy JupyterHub Dockerfile
    copy:
      dest: "{{ jupyterhub_dir }}/Dockerfile.jupyterhub"
      content: |
        FROM jupyterhub/jupyterhub:latest

        USER root

        RUN apt-get update && \
            apt-get install -y \
              sqlite3 \
              vim \
              curl && \
            apt-get clean && \
            rm -rf /var/lib/apt/lists/*

        RUN pip install --no-cache-dir \
            dockerspawner \
            jupyterhub-nativeauthenticator \
            jupyterhub-idle-culler

  - name: Build custom JupyterHub image
    community.docker.docker_image:
      name: gtc-jupyterhub
      source: build
      build:
        path: "{{ jupyterhub_dir }}"
        dockerfile: Dockerfile.jupyterhub

