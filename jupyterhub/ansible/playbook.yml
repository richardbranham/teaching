  - name: Create JupyterHub volume
    community.docker.docker_volume:
      name: jupyterhub-data

  - name: Write Nginx site config
    copy:
      dest: /etc/nginx/sites-available/jupyterhub
      content: |
        server {
            listen 80;
            server_name jhub.branham.us;
            return 301 https://$host$request_uri;
        }

        server {
            listen 443 ssl;
            server_name jhub.branham.us;

            ssl_certificate /etc/letsencrypt/live/jhub.branham.us/fullchain.pem;
            ssl_certificate_key /etc/letsencrypt/live/jhub.branham.us/privkey.pem;

            client_max_body_size 50m;
            client_header_buffer_size 32k;
            large_client_header_buffers 4 32k;

            location / {
                proxy_pass http://127.0.0.1:8000;

                proxy_http_version 1.1;

                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";

                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Forwarded-Host $host;
                proxy_set_header X-Forwarded-Port $server_port;

                proxy_read_timeout 86400;
                proxy_connect_timeout 300;
            }
        }

  - name: Enable Nginx site
    file:
      src: /etc/nginx/sites-available/jupyterhub
      dest: /etc/nginx/sites-enabled/jupyterhub
      state: link

  - name: Remove default Nginx site
    file:
      path: /etc/nginx/sites-enabled/default
      state: absent

  - name: Configure Nginx worker limits
    blockinfile:
      path: /etc/nginx/nginx.conf
      marker: "#{mark} ANSIBLE MANAGED NGINX LIMITS"
      block: |
        #worker_processes auto;
        #worker_rlimit_nofile 65535;

        events {
            #worker_connections 4096;
        }

  - name: Install password reset utility
    copy:
      dest: /srv/jupyterhub/pw-reset.py
      owner: root
      group: root
      mode: "0755"
      content: |
        from jupyterhub.orm import User, new_session_factory
        from nativeauthenticator.orm import UserInfo
        from nativeauthenticator.crypto import set_password

        db = new_session_factory()()

        username = "{{ password_reset_user }}"
        password = "{{ password_reset_password }}"

        user = User.find(db, name=username)

        if not user:
            raise Exception(f"User {username} not found")

        userinfo = db.query(UserInfo).filter(
            UserInfo.user_id == user.id
        ).first()

        if not userinfo:
            raise Exception(f"UserInfo missing for {username}")

        userinfo.password = set_password(password)

        db.commit()

        print(f"Password reset successfully for {username}")

  - name: Run JupyterHub container
    community.docker.docker_container:
      name: jupyterhub
      image: gtc-jupyterhub
      restart_policy: unless-stopped

      published_ports:
        - "8000:8000"

      command:
        - jupyterhub
        - -f
        - /srv/jupyterhub/jupyterhub_config.py

      networks:
        - name: jupyterhub-network

      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
        - "{{ jupyterhub_dir }}/jupyterhub_config.py:/srv/jupyterhub/jupyterhub_config.py"
        - jupyterhub-data:/srv/jupyterhub
        - /srv/jupyterhub/users:/srv/jupyterhub/users
        - /srv/jupyterhub/CIST1220:/srv/jupyterhub/CIST1220

